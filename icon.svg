<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#1a2033"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040"/>
      <stop offset="100%" style="stop-color:#d4af37"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Decorative ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#d4af37" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="256" r="175" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.2"/>
  <!-- Arabic letter ش (shin) in gold -->
  <text
    x="256"
    y="320"
    text-anchor="middle"
    font-family="Arial, Tahoma, sans-serif"
    font-size="220"
    font-weight="bold"
    fill="url(#gold)"
  >ش</text>
  <!-- Small star accents -->
  <text x="256" y="110" text-anchor="middle" font-size="28" fill="#d4af37" opacity="0.8">✦</text>
  <text x="160" y="150" text-anchor="middle" font-size="16" fill="#d4af37" opacity="0.5">✦</text>
  <text x="352" y="150" text-anchor="middle" font-size="16" fill="#d4af37" opacity="0.5">✦</text>
</svg>
