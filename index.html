<style>

  --accent: #d4af37; --accent-glow: rgba(212, 175, 55, 0.35);

}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {

.header-actions { display: flex; gap: 8px; }
.icon-btn {

}

.search-wrap { padding: 14px 16px 10px; }
.search {

.chips-scroll { padding: 4px 16px 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }

.chips { display: flex; gap: 8px; width: max-content; }
.chip {

.stats { padding: 0 16px 12px; display: flex; gap: 14px; font-size: 12px; color: var(--text-dim); }

.main { padding: 0 12px 100px; }

.channel {

<script>
/* ===== EMBEDDED CHANNEL LIST =====
   These channels are built into the app so it works instantly with no network fetching.
   Users can still load external M3U lists via the menu. */
const EMBEDDED_CHANNELS = [];

/* ===== DATA SOURCES =====
   Each source maps to a single small M3U file from iptv-org.
   We fetch through multiple proxies in parallel (Promise.any) — first winner serves. */

const SOURCES = [
  { id: 'arabic',   name: '🌍 القنوات العربية',   url: 'https://iptv-org.github.io/iptv/languages/ara.m3u' },
  { id: 'family',   name: '👨‍👩‍👧 قنوات العائلة',    url: 'https://iptv-org.github.io/iptv/categories/family.m3u' },
  { id: 'blue',     name: '📺 القائمة الرئيسية',   url: 'http://blueiptv.live:8080/get.php?username=375348287443&password=113218353782&type=m3u_plus&output=ts' },
  { id: 'luka',     name: '📺 خادم احتياطي 1',     url: 'http://lukatv.net:8080/get.php?username=375348287443&password=113218353782&type=m3u_plus&output=ts' },
  { id: 'bluecc',   name: '📺 خادم احتياطي 2',     url: 'http://bluetv.cc:8080/get.php?username=375348287443&password=113218353782&type=m3u_plus&output=ts' },
];

/* Proxies - ordered by reliability. We race them in parallel. */
const PROXIES = [
  (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  (u) => `https://thingproxy.freeboard.io/fetch/${u}`,
  (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  (u) => `https://cors.eu.org/${u}`,
  (u) => `https://proxy.cors.sh/${u}`,
  (u) => u
];

let allChannels = [];
let filteredChannels = [];
let activeGroup = 'الكل';
let searchTerm = '';
let currentSourceId = 'arabic';
let hls = null;

function parseM3U(text) {
  const lines = text.split(/\r?\n/);
  const channels = [];
  let current = null;
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    if (trimmed.startsWith('#EXTINF:')) {
      const nameMatch = trimmed.match(/,(.*)$/);
      const tvgLogoMatch = trimmed.match(/tvg-logo="([^"]*)"/);
      const groupMatch = trimmed.match(/group-title="([^"]*)"/);
      const tvgCountryMatch = trimmed.match(/tvg-country="([^"]*)"/);
      current = {
        name: nameMatch ? nameMatch[1].trim() : 'Unknown',
        logo: tvgLogoMatch ? tvgLogoMatch[1] : '',
        group: (groupMatch && groupMatch[1]) ? groupMatch[1] : 'عام',
        country: tvgCountryMatch ? tvgCountryMatch[1] : ''
      };
    } else if (trimmed && !trimmed.startsWith('#') && current) {
      current.url = trimmed;
      channels.push(current);
      current = null;
    }
  }
  return channels;
}

async function tryFetch(url, timeoutMs = 15000, asJson = false) {
  const ctrl = new AbortController();
  const timeout = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const res = await fetch(url, { signal: ctrl.signal });
    clearTimeout(timeout);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    if (asJson) return await res.json();
    const txt = await res.text();
    if (!txt || (!txt.includes('#EXTM3U') && !txt.includes('#EXTINF'))) {
      throw new Error('invalid playlist');
    }
    return txt;
  } catch (e) {
    clearTimeout(timeout);
    throw e;
  }
}

/* Race multiple proxies in parallel — first successful response wins.
   This is far more reliable than sequential fallback because slow/dead
   proxies don't block the fast ones. */
async function fetchM3U(targetUrl) {
  const attempts = PROXIES.map(proxyFn => {
    const proxiedUrl = proxyFn(targetUrl);
    return tryFetch(proxiedUrl, 20000).then(txt => {
      if (!txt || (!txt.includes('#EXTM3U') && !txt.includes('#EXTINF'))) {
        throw new Error('invalid body from ' + proxiedUrl);
      }
      return txt;
    });
  });
  try {
    return await Promise.any(attempts);
  } catch (e) {
    throw new Error('all_proxies_failed');
  }
}

async function loadSource(sourceId) {
  currentSourceId = sourceId;
  const source = SOURCES.find(s => s.id === sourceId) || SOURCES[0];

  // Embedded source: instant, no network
  if (source.embedded) {
    allChannels = EMBEDDED_CHANNELS.slice();
    activeGroup = 'الكل';
    searchTerm = '';
    document.getElementById('searchInput').value = '';
    buildChipsAndRender();
    showToast(`✓ تم تحميل ${allChannels.length} قناة`);
    return;
  }

  // External M3U source via racing proxies
  if (source.url) {
    const content = document.getElementById('content');
    content.innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">${source.name}</div>
        <div class="loading-sub">جاري الاتصال بالخوادم...</div>
      </div>`;
    try {
      const text = await fetchM3U(source.url);
      allChannels = parseM3U(text).filter(c => c.url && !c.url.startsWith('#'));
      if (allChannels.length === 0) {
        showLoadError('القائمة فارغة');
        return;
      }
      activeGroup = 'الكل';
      searchTerm = '';
      document.getElementById('searchInput').value = '';
      buildChipsAndRender();
      showToast(`✓ تم تحميل ${allChannels.length} قناة`);
    } catch (err) {
      console.error('loadSource error:', err);
      showLoadError();
    }
    return;
  }
}

async function loadCustomUrl(url) {
  const content = document.getElementById('content');
  content.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">جاري تحميل القائمة المخصصة...</div></div>`;
  try {
    const text = await fetchM3U(url);
    allChannels = parseM3U(text).filter(c => c.url && !c.url.startsWith('#'));
    if (allChannels.length === 0) throw new Error('empty');
    activeGroup = 'الكل';
    searchTerm = '';
    document.getElementById('searchInput').value = '';
    buildChipsAndRender();
    showToast(`✓ تم تحميل ${allChannels.length} قناة`);
    closeSheet();
  } catch (err) {
    showToast('فشل تحميل الرابط - تحقق من الاتصال');
  }
}

function showLoadError(customMsg) {
  const content = document.getElementById('content');
  const msg = customMsg || 'تحقق من اتصالك بالإنترنت وحاول مجدداً.';
  content.innerHTML = `
    <div class="empty">
      <div class="empty-icon">⚠️</div>
      <div class="empty-title">تعذر تحميل القائمة</div>
      <div>${msg}</div>
      <div style="margin-top:8px;font-size:12px;color:var(--text-dim);">
        أو استخدم <strong style="color:var(--accent);">القائمة المضمّنة</strong> التي تعمل دون اتصال.
      </div>
      <br>
      <button class="action-btn" onclick="loadSource('${currentSourceId}')">إعادة المحاولة</button>
      <button class="action-btn secondary" onclick="loadSource('embedded')">القائمة المضمّنة</button>
    </div>`;
}

function buildChipsAndRender() {
  const groups = {};
  for (const c of allChannels) {
    const g = c.group || 'عام';
    groups[g] = (groups[g] || 0) + 1;
  }
  const sorted = Object.entries(groups).sort((a,b) => b[1] - a[1]);
  const chipsEl = document.getElementById('chips');
  chipsEl.innerHTML = '';

  const allChip = document.createElement('button');
  allChip.className = 'chip' + (activeGroup === 'الكل' ? ' active' : '');
  allChip.innerHTML = `الكل<span class="count">${allChannels.length}</span>`;
  allChip.onclick = () => { activeGroup = 'الكل'; buildChipsAndRender(); };
  chipsEl.appendChild(allChip);

  for (const [g, n] of sorted) {
    const chip = document.createElement('button');
    chip.className = 'chip' + (activeGroup === g ? ' active' : '');
    chip.innerHTML = `${g}<span class="count">${n}</span>`;
    chip.onclick = () => { activeGroup = g; buildChipsAndRender(); };
    chipsEl.appendChild(chip);
  }
  renderChannels();
}

function renderChannels() {
  filteredChannels = allChannels.filter(c => {
    const matchesGroup = activeGroup === 'الكل' || c.group === activeGroup;
    const matchesSearch = !searchTerm || c.name.toLowerCase().includes(searchTerm.toLowerCase());
    return matchesGroup && matchesSearch;
  });

  document.getElementById('stats').innerHTML = `
    <span><strong>${filteredChannels.length}</strong> قناة</span>
    <span class="dot"></span>
    <span>${activeGroup}</span>
  `;

  const content = document.getElementById('content');
  if (filteredChannels.length === 0) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div>لا توجد قنوات مطابقة</div></div>`;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'grid';

  filteredChannels.slice(0, 300).forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'channel';
    card.style.animationDelay = `${Math.min(i * 15, 400)}ms`;

    const shortName = (c.name || '?').substring(0, 3);
    const logoHtml = c.logo
      ? `<img src="${c.logo}" alt="" onerror="this.parentElement.innerHTML='<div class=&quot;fallback&quot;>${shortName}</div>'">`
      : `<div class="fallback">${shortName}</div>`;

    card.innerHTML = `
      <div class="ch-logo">${logoHtml}<div class="ch-live">LIVE</div></div>
      <div class="ch-body">
        <div class="ch-name">${c.name}</div>
        <div class="ch-meta">${c.group || 'عام'}${c.country ? ' · ' + c.country : ''}</div>
      </div>`;
    card.onclick = () => playChannel(c);
    grid.appendChild(card);
  });

  content.innerHTML = '';
  content.appendChild(grid);

  if (filteredChannels.length > 300) {
    const more = document.createElement('div');
    more.style.cssText = 'text-align:center;padding:20px;color:var(--text-dim);font-size:13px;';
    more.textContent = `عرض 300 من أصل ${filteredChannels.length} — استخدم البحث للتصفية`;
    content.appendChild(more);
  }
}

function playChannel(channel) {
  const modal = document.getElementById('playerModal');
  const video = document.getElementById('video');
  const title = document.getElementById('playerTitle');
  const sub = document.getElementById('playerSub');
  const status = document.getElementById('playerStatus');
  const statusText = document.getElementById('playerStatusText');

  title.textContent = channel.name;
  sub.textContent = channel.group + (channel.country ? ' · ' + channel.country : '');
  modal.classList.add('open');
  status.classList.remove('hidden');
  statusText.textContent = 'جاري الاتصال بالبث...';
  modal.dataset.url = channel.url;

  if (hls) { hls.destroy(); hls = null; }
  video.pause();
  video.removeAttribute('src');
  video.load();

  const isHls = /\.m3u8(\?|$)/i.test(channel.url);
  video.onplaying = () => status.classList.add('hidden');
  video.onerror = () => {
    statusText.innerHTML = 'فشل تشغيل البث<br><small style="color:var(--text-dim);font-size:12px;">البث قد يكون محمياً. جرّب زر VLC.</small>';
  };

  if (isHls && window.Hls && Hls.isSupported()) {
    hls = new Hls({ enableWorker: true, lowLatencyMode: true });
    hls.loadSource(channel.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(() => statusText.textContent = 'اضغط تشغيل للبدء');
    });
    hls.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        statusText.innerHTML = 'تعذر تشغيل البث<br><small style="color:var(--text-dim);font-size:12px;">الرابط قد لا يدعم التشغيل في المتصفح. جرّب VLC.</small>';
      }
    });
  } else {
    video.src = channel.url;
    video.play().catch(() => statusText.textContent = 'اضغط تشغيل للبدء');
  }
}

function closePlayer() {
  const modal = document.getElementById('playerModal');
  const video = document.getElementById('video');
  modal.classList.remove('open');
  if (hls) { hls.destroy(); hls = null; }
  video.pause();
  video.removeAttribute('src');
  video.load();
}

function openSheet() {
  const opts = document.getElementById('sourceOptions');
  opts.innerHTML = '';
  SOURCES.forEach(s => {
    const el = document.createElement('div');
    el.className = 'source-opt' + (s.id === currentSourceId ? ' active' : '');
    el.innerHTML = `<div class="source-opt-title">${s.name}</div><div class="source-opt-desc">${s.desc}</div>`;
    el.onclick = () => { closeSheet(); loadSource(s.id); };
    opts.appendChild(el);
  });
  document.getElementById('sourceSheet').classList.add('open');
}
function closeSheet() { document.getElementById('sourceSheet').classList.remove('open'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderChannels();
});
document.getElementById('closePlayer').onclick = closePlayer;
document.getElementById('refreshBtn').onclick = () => loadSource(currentSourceId);
document.getElementById('sourceBtn').onclick = openSheet;
document.getElementById('loadCustomBtn').onclick = () => {
  const url = document.getElementById('customUrl').value.trim();
  if (url) loadCustomUrl(url);
};
document.getElementById('copyUrlBtn').onclick = () => {
  const url = document.getElementById('playerModal').dataset.url;
  navigator.clipboard.writeText(url).then(() => showToast('تم نسخ الرابط'));
};
document.getElementById('externalBtn').onclick = () => {
  const url = document.getElementById('playerModal').dataset.url;
  window.location.href = 'vlc://' + url;
  setTimeout(() => window.open(url, '_blank'), 500);
};
document.getElementById('playerModal').addEventListener('click', (e) => {
  if (e.target.id === 'playerModal') closePlayer();
});
document.getElementById('sourceSheet').addEventListener('click', (e) => {
  if (e.target.id === 'sourceSheet') closeSheet();
});

loadSource('arabic');
</script>
